<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker Login</title>

    <!-- tailwind+daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center lg:min-h-screen h-auto mx-auto">

    <div class="card bg-white shadow-xl w-96 p-8">

        <div class="text-center mb-6">
            <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-36 mx-auto">
            <h2 class="text-2xl font-bold mt-2">GitHub Issues Tracker</h2>
            <p class="text-gray-500/90 text-medium">Sign in to manage your issues</p>
        </div>

        <div>
            <label class="label text-neutral font-medium">Username</label>
            <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full">
            <label class="label text-sm text-[#4a00ffFF] font-medium mb-5">Default: <b>admin</b></label><br>

            <label class="label text-neutral font-medium">Password</label>
            <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full">
            <label class="label text-sm text-[#4a00ffFF] font-medium mb-5">Default: <b>admin123</b></label>

            <button class="btn btn-primary w-full">Sign In</button>
        </div>

        <div class="flex items-center mt-4">
            <hr class="grow border-gray-300">
            <span class="">OR</span>
            <hr class="grow border-gray-300">
        </div>

        <div class="text-center mt-4 text-sm text-gray-500">
            <p class="mb-2">Demo Credentials:</p>
            <div class="bg-gray-100 py-3 rounded-l-md">
                <p><b>Username: </b>admin</p>
                <p><b>Password: </b>admin123</p>
            </div>
        </div>

    </div>

    <script src="./login.js"></script>

</body>

</html>
