<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Issues Tracker Dashboard</title>

    <!-- tailwind+daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-gray-100 lg:min-h-screen">

    <!-- Navbar -->
    <nav class="navbar bg-white shadow-md px-30 py-5">

        <div class="w-10 rounded-full">
            <img alt="Tailwind CSS Navbar component" src="./assets/github-logo.png" />
        </div>

        <div class="flex-1">
            <h1 class="px-2 text-2xl font-bold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-2">
            <div class="relative w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2"></i>
                <input id="searchInput" type="text" placeholder="Search issues..."
                    class="border pl-10 py-2 w-full rounded">
            </div>

            <button class="btn btn-primary">Search</button>
        </div>
    </nav>


    <!-- Buttons -->
    <section class="bg-[#F8FAFC] max-w-9/12 m-auto mt-15 rounded-xl">
        <div class="flex gap-5 p-5 mb-5">
            <button onclick="toggleTab('btn-all')" id="btn-all" class="btn bg-blue-600 text-white px-8">All</button>

            <button onclick="toggleTab('btn-open')" id="btn-open" class="btn bg-white text-black/60 px-8">Open</button>

            <button onclick="toggleTab('btn-closed')" id="btn-closed"
                class="btn bg-white text-black/60 px-8">Closed</button>
        </div>
    </section>


    <main class="bg-[#F8FAFC] max-w-9/12 m-auto mt-5 rounded-xl">

        <!-- issues -->
        <div class="flex justify-between mx-5 py-3">
            <div class="flex items-center gap-4">
                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 id="issueCount" class="font-bold text-xl">50 Issues</h2>
                    <p class="text-gray-600">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-3 mt-3">
                <p class="text-green-600 font-semibold"><i class="fa-solid fa-circle"></i>Open</p>
                <p class="text-purple-600 font-semibold"><i class="fa-solid fa-circle"></i>Closed</p>
            </div>
        </div>

        <!-- Loader -->

        <div id="loader" class="text-center hidden">
            <span class="loading loading-spinner loading-lg"></span>
        </div>


        <!-- Issues Card -->

        <div id="issuesContainer" class="grid lg:grid-cols-4 sm:grid-cols-2 md:grid-cols-3 gap-6 p-5">

        </div>

        <!-- Issue Details Modal -->
        <dialog id="issue_modal" class="modal">
            <div class="bg-white p-6 rounded-xl w-[600px]">
                <div id="modal_content"></div>

                <div class="flex justify-end mt-6">
                    <button onclick="issue_modal.close()" class="btn btn-primary">
                        Close
                    </button>
                </div>
            </div>
        </dialog>

    </main>

    <script src="./dashboard.js"></script>

</body>

</html>
