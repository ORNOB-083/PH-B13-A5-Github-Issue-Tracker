<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Issues Tracker Dashboard</title>

    <!-- tailwind+daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-gray-100">

    <!-- Navbar -->

    <nav class="navbar bg-white shadow-md px-30 py-5">

        <div class="w-10 rounded-full">
            <img alt="Tailwind CSS Navbar component" src="./assets/github-logo.png" />
        </div>

        <div class="flex-1">
            <h1 class="px-2 text-xl font-bold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-2">
            <div class="relative w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2"></i>
                <input type="text" placeholder="Search issues..." class="border pl-10 py-2 w-full rounded">
            </div>

            <button class="btn btn-primary">Search</button>
        </div>
    </nav>

    <script src="./dashboard.js"></script>

</body>

</html>
